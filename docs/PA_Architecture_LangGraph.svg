<svg width="100%" viewBox="0 0 680 820" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
.th { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #3C3489; }
.ts { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #534AB7; }
.th-teal { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #085041; }
.ts-teal { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #0F6E56; }
.th-amber { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #633806; }
.ts-amber { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #854F0B; }
.th-gray { font-family: system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #444441; }
.ts-coral { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #712B13; }
.ts-legend { font-family: system-ui, sans-serif; font-size: 12px; font-weight: 400; fill: #5F5E5A; }
.arr { stroke: #888780; stroke-width: 1.5; fill: none; }
</style>
</defs>

<!-- Start node -->
<rect x="265" y="20" width="150" height="44" rx="22" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th-gray" x="340" y="42" text-anchor="middle" dominant-baseline="central">__start__</text>

<!-- Arrow start → coverage_check -->
<line x1="340" y1="64" x2="340" y2="108" class="arr" marker-end="url(#arrow)"/>

<!-- PA-1: coverage_check -->
<rect x="215" y="108" width="250" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">PA-1  coverage_check</text>
<text class="ts" x="340" y="148" text-anchor="middle" dominant-baseline="central">CDS Hooks CRD · payer check</text>

<!-- Early exit label from coverage_check -->
<path d="M465 136 L540 136 L540 748 L430 748" fill="none" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="466" y="112" width="138" height="26" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts-coral" x="535" y="125" text-anchor="middle" dominant-baseline="central">PA not required / error</text>

<!-- Arrow coverage → dtr_fetch -->
<line x1="340" y1="164" x2="340" y2="208" class="arr" marker-end="url(#arrow)"/>

<!-- PA-2: dtr_fetch -->
<rect x="215" y="208" width="250" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="228" text-anchor="middle" dominant-baseline="central">PA-2  dtr_fetch</text>
<text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central">DTR questionnaire · Firestore cache</text>

<!-- Arrow dtr → questionnaire_filler -->
<line x1="340" y1="264" x2="340" y2="308" class="arr" marker-end="url(#arrow)"/>

<!-- PA-3: questionnaire_filler -->
<rect x="195" y="308" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="328" text-anchor="middle" dominant-baseline="central">PA-3  questionnaire_filler</text>
<text class="ts" x="340" y="348" text-anchor="middle" dominant-baseline="central">Gemini Q&amp;A · FHIR citations</text>

<!-- Early exit from questionnaire_filler -->
<path d="M485 336 L560 336 L560 748 L430 748" fill="none" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="488" y="312" width="130" height="26" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts-coral" x="553" y="325" text-anchor="middle" dominant-baseline="central">Citation hard fail</text>

<!-- Arrow questionnaire → bundle_assembler -->
<line x1="340" y1="364" x2="340" y2="408" class="arr" marker-end="url(#arrow)"/>

<!-- PA-4: bundle_assembler -->
<rect x="195" y="408" width="290" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="th" x="340" y="428" text-anchor="middle" dominant-baseline="central">PA-4  bundle_assembler</text>
<text class="ts" x="340" y="448" text-anchor="middle" dominant-baseline="central">PAS bundle · Cloud DLP audit</text>

<!-- Early exit from bundle_assembler -->
<path d="M485 436 L580 436 L580 748 L430 748" fill="none" stroke="#B4B2A9" stroke-width="1.5" marker-end="url(#arrow)"/>
<rect x="488" y="412" width="110" height="26" rx="4" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts-coral" x="543" y="425" text-anchor="middle" dominant-baseline="central">DLP block / error</text>

<!-- Arrow bundle → interrupt -->
<line x1="340" y1="464" x2="340" y2="508" class="arr" marker-end="url(#arrow)"/>

<!-- INTERRUPT node -->
<rect x="195" y="508" width="290" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="th-amber" x="340" y="528" text-anchor="middle" dominant-baseline="central">INTERRUPT</text>
<text class="ts-amber" x="340" y="548" text-anchor="middle" dominant-baseline="central">Clinician reviews bundle + DLP</text>

<!-- Arrow interrupt → pas_submit -->
<line x1="340" y1="564" x2="340" y2="608" class="arr" marker-end="url(#arrow)"/>
<rect x="275" y="572" width="130" height="22" rx="4" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts-teal" x="340" y="583" text-anchor="middle" dominant-baseline="central">clinician approves</text>

<!-- PA-5: pas_submit -->
<rect x="215" y="608" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="th-teal" x="340" y="628" text-anchor="middle" dominant-baseline="central">PA-5  pas_submit</text>
<text class="ts-teal" x="340" y="648" text-anchor="middle" dominant-baseline="central">Payer $submit · FHIR · Pub/Sub</text>

<!-- Arrow pas_submit → end -->
<line x1="340" y1="664" x2="340" y2="748" class="arr" marker-end="url(#arrow)"/>

<!-- End node -->
<rect x="265" y="748" width="150" height="44" rx="22" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text class="th-gray" x="340" y="770" text-anchor="middle" dominant-baseline="central">__end__</text>

<!-- Legend -->
<rect x="40" y="340" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text class="ts-legend" x="58" y="351" dominant-baseline="central">Pipeline nodes</text>
<rect x="40" y="362" width="12" height="12" rx="2" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text class="ts-legend" x="58" y="373" dominant-baseline="central">Human interrupt</text>
<rect x="40" y="384" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text class="ts-legend" x="58" y="395" dominant-baseline="central">Submission</text>
<rect x="40" y="406" width="12" height="12" rx="2" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text class="ts-legend" x="58" y="417" dominant-baseline="central">Early exit</text>
</svg>
